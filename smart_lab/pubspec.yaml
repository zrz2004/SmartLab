name: smart_lab
description: 智慧实验室安全监测与预警系统
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5

  dio: ^5.4.0
  mqtt_client: ^10.0.0
  web_socket_channel: ^2.4.0

  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0

  fl_chart: ^0.66.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  image_picker: ^1.1.2

  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^18.0.0

  intl: ^0.18.1
  logger: ^2.0.2
  uuid: ^4.2.1

  local_auth: ^2.1.6
  go_router: ^13.0.0
  get_it: ^7.6.4
  injectable: ^2.3.2

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.jpg"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon.jpg"
  web:
    generate: true
    image_path: "assets/icons/app_icon.jpg"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
